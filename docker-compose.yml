services:
  request-capture-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: request-capture-proxy
    environment:
      MODE: ${MODE:-proxy}
      LISTEN_HOST: ${LISTEN_HOST:-0.0.0.0}
      LISTEN_PORT: ${LISTEN_PORT:-8080}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      MAX_BODY_LOG_BYTES: ${MAX_BODY_LOG_BYTES:-131072}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-30}
      PRESERVE_HOST_HEADER: ${PRESERVE_HOST_HEADER:-false}
      REQUEST_ENTRY_PATH: ${REQUEST_ENTRY_PATH:-/forward/request}
      RESPONSE_ENTRY_PATH: ${RESPONSE_ENTRY_PATH:-/forward/response}
      SAML_INSTANCE_SSO_PATH: ${SAML_INSTANCE_SSO_PATH:-/saml/instance/sso}
      SAML_INSTANCE_ACS_PATH: ${SAML_INSTANCE_ACS_PATH:-/saml/instance/acs}
      REQUEST_FORWARD_URL: ${REQUEST_FORWARD_URL:-}
      RESPONSE_FORWARD_URL: ${RESPONSE_FORWARD_URL:-}
      SAML_REQUEST_TARGETS: ${SAML_REQUEST_TARGETS:-}
      IDP_POST_URL: ${IDP_POST_URL:-}
      IDP_SAML_RESPONSE: ${IDP_SAML_RESPONSE:-}
      IDP_FORM_FIELD_NAME: ${IDP_FORM_FIELD_NAME:-SAMLResponse}
      IDP_RELAY_STATE: ${IDP_RELAY_STATE:-}
      IDP_PASSTHROUGH_RELAY_STATE: ${IDP_PASSTHROUGH_RELAY_STATE:-true}
      IDP_EXTRA_FORM_FIELDS: ${IDP_EXTRA_FORM_FIELDS:-{}}
      IDP_SET_COOKIE_NAME: ${IDP_SET_COOKIE_NAME:-}
      IDP_SET_HEADER_NAME: ${IDP_SET_HEADER_NAME:-}
      IDP_BODY_TEMPLATE: ${IDP_BODY_TEMPLATE:-}
      IDP_HTTP_STATUS: ${IDP_HTTP_STATUS:-200}
      IDP_CONTENT_TYPE: ${IDP_CONTENT_TYPE:-text/html; charset=utf-8}
    ports:
      - "${LISTEN_PORT:-8080}:${LISTEN_PORT:-8080}"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; p=os.environ.get('LISTEN_PORT','8080'); urllib.request.urlopen(f'http://127.0.0.1:{p}/healthz', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
